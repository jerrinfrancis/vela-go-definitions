apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: check-metrics-workflow
  annotations:
    app.oam.dev/publishVersion: v1
spec:
  components:
  - name: nginx-server
    type: webservice
    properties:
      image: nginx:latest
      ports:
      - port: 80

  workflow:
    steps:
    # Step 1: Deploy the component
    - name: deploy
      type: apply-component
      properties:
        component: nginx-server

    # Step 2: Check metrics example
    # NOTE: This step requires Prometheus to be installed in your cluster.
    # Without Prometheus, this step will fail. To test without Prometheus,
    # you can skip this step or install Prometheus first.
    #
    # To install Prometheus:
    #   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
    #   helm install prometheus prometheus-community/prometheus -n o11y-system --create-namespace
    #
    - name: check-health
      type: check-metrics
      timeout: 2m
      properties:
        # Simple query: check if prometheus server itself is up
        # 'up{job="prometheus"}' checks if Prometheus can scrape itself
        query: "up{job=\"prometheus\"}"
        # Prometheus endpoint (internal cluster DNS - NOT localhost)
        # localhost:9090 is your port-forward for browser access
        # Inside the cluster, use the service DNS name
        metricEndpoint: "http://prometheus-server.o11y-system.svc.cluster.local:80"
        # Condition: value must be >= 1
        condition: ">=1"
        # Duration to maintain the condition
        duration: "30s"
        # Time before failing
        failDuration: "1m"
